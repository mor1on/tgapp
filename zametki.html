<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои заметки</title>
    <style>
        body {
            background-color: #003135;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        .container {
            background: rgba(0, 0, 0, 0.2);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 255, 198, 0.1);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }
        h1 {
            color: #00FFC6;
            margin-bottom: 30px;
            font-weight: 400;
            letter-spacing: 2px;
        }
        #noteField {
            width: 100%;
            height: 200px;
            background-color: rgba(0, 0, 0, 0.3);
            border: 2px solid #00FFC6;
            border-radius: 10px;
            padding: 15px;
            color: white;
            font-size: 16px;
            font-family: inherit;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 25px;
            outline: none;
            transition: box-shadow 0.3s ease;
        }
        #noteField:focus {
            box-shadow: 0 0 15px rgba(0, 255, 198, 0.3);
        }
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }
        button {
            background: transparent;
            border: 2px solid #00FFC6;
            color: #00FFC6;
            padding: 12px 24px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            flex: 1;
        }
        button:hover {
            background: #00FFC6;
            color: #003135;
            box-shadow: 0 0 15px rgba(0, 255, 198, 0.4);
        }
        .return-button {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.7);
            padding: 12px 24px;
            text-decoration: none;
            display: inline-block;
            font-size: 14px;
            border-radius: 8px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .return-button:hover {
            border-color: white;
            color: white;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>МОИ ЗАМЕТКИ</h1>
        <textarea id="noteField" readonly></textarea>
        
        <div class="btn-group">
            <button id="editButton">Изменить</button>
            <button id="saveButton">Сохранить</button>
        </div>

        <a href="index.html" class="return-button">На главную</a>
    </div>

    <script>
        let noteField = document.getElementById('noteField');
        let editButton = document.getElementById('editButton');
        let saveButton = document.getElementById('saveButton');

        window.onload = function() {
            let savedNote = localStorage.getItem('note');
            if (savedNote) {
                noteField.value = savedNote;
            }
        };

        editButton.onclick = function() {
            noteField.readOnly = false;
            noteField.focus();
        };

        saveButton.onclick = function() {
            localStorage.setItem('note', noteField.value);
            noteField.readOnly = true;
        };
    </script>

</body>
</html>
